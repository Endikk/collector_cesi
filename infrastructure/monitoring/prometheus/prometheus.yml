global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'backend'
    scrape_interval: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:3000']

  - job_name: 'frontend'
    scrape_interval: 5s
    metrics_path: /api/metrics
    static_configs:
      - targets: ['frontend:3000']
