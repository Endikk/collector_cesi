apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: collector-frontend:local
          imagePullPolicy: Never # Important pour utiliser l'image locale buildée dans Minikube
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "development"
            - name: DATABASE_URL
              value: "postgresql://user:password@postgres-service.collector.svc.cluster.local:5432/collector?schema=public"
            # Next.js nécessite souvent d'être bindé sur 0.0.0.0 pour être accessible hors du conteneur
            - name: HOSTNAME
              value: "0.0.0.0"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: collector
spec:
  type: LoadBalancer # Permet d'exposer le service (simule un LB cloud)
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80 # Expose sur le port 80 du LB
      targetPort: 3000 # Redirige vers le port 3000 du conteneur
