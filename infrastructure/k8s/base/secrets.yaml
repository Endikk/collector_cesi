# =============================================================================
# Kubernetes Secrets — Collector.shop
# En production, utiliser Sealed Secrets, Vault, ou le secrets manager du cloud.
# Ces valeurs sont des placeholders pour le développement local (Minikube).
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: collector
  labels:
    app: collector
    component: database
type: Opaque
stringData:
  POSTGRES_USER: "user"
  POSTGRES_PASSWORD: "password"
  POSTGRES_DB: "collector"
  DATABASE_URL: "postgresql://user:password@db:5432/collector?schema=public"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: collector
  labels:
    app: collector
    component: backend
type: Opaque
stringData:
  JWT_SECRET: "dev-jwt-secret-key"
  ENCRYPTION_KEY: "359fdc41e2148464203957aeb095265f07851619eb357c56df4d42b18cb3ce0c"
  STRIPE_SECRET_KEY: "sk_test_placeholder"
  STRIPE_PUBLISHABLE_KEY: "pk_test_placeholder"
  STRIPE_WEBHOOK_SECRET: "whsec_placeholder"
  SMTP_USER: "dev"
  SMTP_PASSWORD: "dev"
  FRAUD_DETECTION_API_KEY: "dev-key"
  INTERNAL_API_KEY: "collector-internal-s2s-dev-key-2024"
---
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secrets
  namespace: collector
  labels:
    app: collector
    component: frontend
type: Opaque
stringData:
  NEXTAUTH_SECRET: "dev-nextauth-secret-key"
