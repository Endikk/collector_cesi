apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: collector
  labels:
    app: backend
spec:
  type: LoadBalancer
  ports:
    - port: 4000
      targetPort: 3000
      name: http
    - port: 5555
      targetPort: 5555
      name: prisma-studio
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: collector-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 5555
              name: debug
          env:
            - name: DATABASE_URL
              value: postgresql://user:password@db:5432/collector?schema=public
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: PORT
              value: "3000"
            # Secrets should be mounted via Secret/ConfigMap in prod
            - name: JWT_SECRET
              value: "dev-jwt-secret-key"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=768"
            # Chiffrement (obligatoire au démarrage)
            - name: ENCRYPTION_KEY
              value: "359fdc41e2148464203957aeb095265f07851619eb357c56df4d42b18cb3ce0c"
            # Stripe (valeurs de test)
            - name: STRIPE_SECRET_KEY
              value: "sk_test_placeholder"
            - name: STRIPE_PUBLISHABLE_KEY
              value: "pk_test_placeholder"
            - name: STRIPE_WEBHOOK_SECRET
              value: "whsec_placeholder"
            # SMTP (désactivé en dev)
            - name: SMTP_HOST
              value: "localhost"
            - name: SMTP_PORT
              value: "1025"
            - name: SMTP_SECURE
              value: "false"
            - name: SMTP_USER
              value: "dev"
            - name: SMTP_PASSWORD
              value: "dev"
            - name: SMTP_FROM
              value: "dev@collector.local"
            # Fraud detection (désactivé en dev)
            - name: FRAUD_DETECTION_WEBHOOK_URL
              value: "http://localhost"
            - name: FRAUD_DETECTION_API_KEY
              value: "dev-key"
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
