apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: collector
  labels:
    app: frontend
spec:
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: collector-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # --- Secrets (via K8s Secret) ---
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: frontend-secrets
                  key: NEXTAUTH_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
            # --- Config (non-sensible) ---
            # Le runner Next.js standalone tourne en HTTP.
            # HTTPS est terminé à l'ingress NGINX (https://collector.local).
            - name: HTTPS_ENABLED
              value: "false"
            - name: BACKEND_URL
              value: "http://backend:4000"
            - name: NEXT_PUBLIC_BACKEND_URL
              value: "http://localhost:4000"
            - name: NEXTAUTH_URL
              value: "https://collector.local"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secrets
                  key: INTERNAL_API_KEY
            - name: NODE_TLS_REJECT_UNAUTHORIZED
              value: "0"
            # --- Redis ---
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
          startupProbe:
            httpGet:
              path: /
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
          livenessProbe:
            httpGet:
              path: /
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
# Ingress HTTPS — TLS terminé ici par NGINX Ingress Controller.
# Le pod frontend tourne en HTTP, mais l'accès externe est HTTPS.
#
# Pour accéder via https://collector.local :
#   1) make hosts   → ajoute "127.0.0.1 collector.local" dans /etc/hosts
#   2) make tunnel  → lance minikube tunnel (dans un autre terminal)
#   3) Browser      → https://collector.local
#
# Le secret TLS "collector-tls" est injecté automatiquement par : make run
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: collector
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - collector.local
      secretName: collector-tls
  rules:
    - host: collector.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
