apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: collector
  labels:
    app: frontend
spec:
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
  selector:
    app: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: collector-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            # Backend URL for server-side calls (internal cluster DNS)
            - name: BACKEND_URL
              value: "http://backend:4000"
            # Backend URL for client-side calls (public URL via minikube tunnel)
            - name: NEXT_PUBLIC_BACKEND_URL
              value: "https://localhost:4000"
            # NextAuth — obligatoire en mode production
            - name: NEXTAUTH_SECRET
              value: "dev-nextauth-secret-key"
            - name: NEXTAUTH_URL
              value: "https://localhost:3000"
            - name: DATABASE_URL
              value: "postgresql://user:password@db:5432/collector?schema=public"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: collector
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: collector.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
