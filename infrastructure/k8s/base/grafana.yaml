apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: collector
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
        access: proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: collector
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: Collector
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-backend
  namespace: collector
data:
  developer.json: |
    {
      "title": "Collector — Developer",
      "uid": "collector-developer",
      "schemaVersion": 38,
      "refresh": "5s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Requêtes HTTP — Total",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "expr": "sum(http_requests_total)", "legendFormat": "Total" }]
        },
        {
          "id": 2,
          "title": "Erreurs HTTP (4xx/5xx)",
          "type": "stat",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "expr": "sum(rate(http_requests_total{status_code=~\"4..|5..\"}[1m]))", "legendFormat": "Erreurs/s" }],
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "red", "value": 0.1 }] } } }
        },
        {
          "id": 8,
          "title": "DB Queries Active",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "targets": [{ "expr": "prisma_client_queries_active", "legendFormat": "Active" }]
        },
        {
          "id": 3,
          "title": "Latence par Route (p95)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "targets": [{ "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, route))", "legendFormat": "{{route}}" }]
        },
        {
          "id": 4,
          "title": "Trafic par Code HTTP",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "targets": [{ "expr": "sum(rate(http_requests_total[1m])) by (status_code)", "legendFormat": "{{status_code}}" }]
        },
        {
          "id": 6,
          "title": "Utilisation CPU & Event Loop",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(process_cpu_seconds_total[1m])", "legendFormat": "CPU User" },
            { "expr": "nodejs_eventloop_lag_seconds", "legendFormat": "Event Loop Lag" }
          ]
        },
        {
          "id": 5,
          "title": "Utilisation Mémoire (Heap)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "targets": [{ "expr": "nodejs_heap_size_used_bytes", "legendFormat": "Used Heap" }]
        }
      ]
    }
  manager.json: |
    {
      "title": "Collector — Manager",
      "uid": "collector-manager",
      "schemaVersion": 38,
      "refresh": "10s",
      "time": { "from": "now-24h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Disponibilité du Service (Uptime)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 8, "h": 6 },
          "targets": [{ "expr": "(sum(rate(http_requests_total{status_code!~\"5..\"}[5m])) / sum(rate(http_requests_total[5m]))) * 100", "legendFormat": "Uptime %" }],
          "fieldConfig": { "defaults": { "unit": "percent", "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "green", "value": 99 }] } } }
        },
        {
          "id": 2,
          "title": "Volume de Trafic (Requêtes/min)",
          "type": "stat",
          "gridPos": { "x": 8, "y": 0, "w": 8, "h": 6 },
          "targets": [{ "expr": "sum(rate(http_requests_total[1m])) * 60", "legendFormat": "Req/min" }]
        },
        {
          "id": 3,
          "title": "Utilisateurs Actifs (Estimés sur 5m)",
          "type": "stat",
          "gridPos": { "x": 16, "y": 0, "w": 8, "h": 6 },
          "targets": [{ "expr": "sum(rate(http_requests_total[5m])) * 10", "legendFormat": "Utilisateurs (est.)" }],
          "description": "Estimation basée sur le trafic"
        },
        {
          "id": 4,
          "title": "Tendance du Trafic (24h)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 6, "w": 24, "h": 10 },
          "targets": [{ "expr": "sum(rate(http_requests_total[1h]))", "legendFormat": "Requêtes/seconde (moyenne 1h)" }]
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: collector
spec:
  type: LoadBalancer
  selector:
    app: grafana
  ports:
    - port: 3002
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
          volumeMounts:
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboard-backend
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: grafana-dashboard-backend
          configMap:
            name: grafana-dashboard-backend
