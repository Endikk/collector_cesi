
name: 🚀 Quality & Delivery

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================================================================
  # BACKEND QUALITY GATE
  # Lint + Unit Tests + Build
  # ==================================================================
  backend-quality:
    name: 🛡️ Backend — Lint, Tests, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: collector_test
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d collector_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/collector_test?schema=public
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 7d
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      ENCRYPTION_KEY: 359fdc41e2148464203957aeb095265f07851619eb357c56df4d42b18cb3ce0c
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: false
      SMTP_USER: dev
      SMTP_PASSWORD: dev
      SMTP_FROM: ci@collector.local
      FRAUD_DETECTION_WEBHOOK_URL: https://localhost
      FRAUD_DETECTION_API_KEY: ci-key
      HTTPS_ENABLED: false

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: 🧬 Prisma Generate
        run: npx -y prisma generate --schema=backend/prisma/schema.prisma

      - name: 🗄️ Apply Migrations (Test DB)
        run: npx -y prisma migrate deploy --schema=backend/prisma/schema.prisma

      - name: 🎨 Backend Lint
        working-directory: ./backend
        run: npm run lint

      - name: 🧪 Backend Unit Tests
        working-directory: ./backend
        run: npm run test -- --ci --coverage

      - name: 🧪 Backend E2E Tests
        working-directory: ./backend
        run: npm run test:e2e -- --ci

      - name: 🏗️ Backend Build
        working-directory: ./backend
        run: npm run build

      - name: 📊 Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ==================================================================
  # FRONTEND QUALITY GATE
  # Lint + Unit Tests + Build
  # ==================================================================
  frontend-quality:
    name: 🎨 Frontend — Lint, Tests, Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: 🧬 Prisma Generate (Backend schema)
        run: npx -y prisma generate --schema=backend/prisma/schema.prisma

      - name: 🧬 Prisma Generate (Frontend schema)
        run: npx -y prisma generate --schema=frontend/prisma/schema.prisma

      - name: 🎨 Frontend Lint
        working-directory: ./frontend
        run: npm run lint

      - name: 🧪 Frontend Tests
        working-directory: ./frontend
        run: npm run test -- --ci

      - name: 🏗️ Frontend Build
        working-directory: ./frontend
        run: npm run build

  # ==================================================================
  # DEPENDENCY AUDIT
  # Vérifie les vulnérabilités connues dans les dépendances
  # ==================================================================
  dependency-audit:
    name: 🔍 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: 🔒 npm audit (Root)
        run: npm audit --omit=dev --audit-level=high || true

      - name: 🔒 npm audit (Backend)
        working-directory: ./backend
        run: npm audit --omit=dev --audit-level=high || true

      - name: 🔒 npm audit (Frontend)
        working-directory: ./frontend
        run: npm audit --omit=dev --audit-level=high || true

  # ==================================================================
  # SECURITY SCAN & DOCKER BUILD
  # Construit les images Docker et les scanne avec Trivy
  # ==================================================================
  security-and-build:
    name: 🔒 Security Scan & Docker Build
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐳 Build Backend Image
        run: docker build -f backend/Dockerfile -t collector-backend:latest ./backend

      - name: 🔍 Trivy Scan — Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'collector-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 🐳 Build Frontend Image
        run: docker build -f frontend/Dockerfile -t collector-frontend:latest .

      - name: 🔍 Trivy Scan — Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'collector-frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ==================================================================
  # DEPLOY SIMULATION
  # Simule le déploiement (Terraform + K8s)
  # ==================================================================
  deploy-simulation:
    name: 🚀 Deploy Simulation
    runs-on: ubuntu-latest
    needs: [security-and-build, dependency-audit]
    if: github.event_name == 'push'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'recette' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://collector.app' || 'https://recette.collector.app' }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: � Install kubectl
        uses: azure/setup-kubectl@v4

      - name: 🔧 Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: ✅ Validate Kubernetes Manifests
        run: |
          echo "════════════════════════════════════════"
          echo "  🔍 VALIDATION DES MANIFESTS K8S"
          echo "════════════════════════════════════════"
          echo ""

          # Étape 1 : Kustomize build (vérifie la syntaxe et les refs)
          echo "1. kustomize build infrastructure/k8s/base/"
          kustomize build infrastructure/k8s/base/ > /tmp/k8s-manifests.yaml
          echo "   ✅ Kustomize build réussi"
          echo ""

          # Étape 2 : kubectl dry-run (validation structurelle)
          echo "2. kubectl apply --dry-run=client"
          kubectl apply --dry-run=client -f /tmp/k8s-manifests.yaml
          echo "   ✅ Dry-run validé — les manifests sont conformes"
          echo ""

          # Étape 3 : Vérification des Secrets (pas de valeurs en dur dans les Deployments)
          echo "3. Vérification de l'utilisation des K8s Secrets..."
          if grep -q 'secretKeyRef' infrastructure/k8s/base/backend.yaml && \
             grep -q 'secretKeyRef' infrastructure/k8s/base/frontend.yaml && \
             grep -q 'secretKeyRef' infrastructure/k8s/base/postgres.yaml; then
            echo "   ✅ Tous les secrets sont référencés via secretKeyRef"
          else
            echo "   ⚠️ Certains manifests n'utilisent pas secretKeyRef"
          fi
          echo ""

          # Étape 4 : Compter les ressources
          echo "4. Ressources K8s générées :"
          echo "   Deployments : $(grep -c 'kind: Deployment' /tmp/k8s-manifests.yaml)"
          echo "   StatefulSets: $(grep -c 'kind: StatefulSet' /tmp/k8s-manifests.yaml)"
          echo "   Services    : $(grep -c 'kind: Service' /tmp/k8s-manifests.yaml)"
          echo "   Secrets     : $(grep -c 'kind: Secret' /tmp/k8s-manifests.yaml)"
          echo "   HPA         : $(grep -c 'kind: HorizontalPodAutoscaler' /tmp/k8s-manifests.yaml)"
          echo "   Ingress     : $(grep -c 'kind: Ingress' /tmp/k8s-manifests.yaml)"
          echo ""

      - name: 🏗️ Terraform Validation
        run: |
          echo "════════════════════════════════════════"
          echo "  🏗️ VALIDATION TERRAFORM"
          echo "════════════════════════════════════════"

      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: ✅ Terraform Init & Validate
        working-directory: ./infrastructure/terraform
        run: |
          terraform init -backend=false
          terraform validate
          echo "✅ Configuration Terraform valide"

      - name: 🚚 Deploy Summary
        run: |
          ENV_NAME="${{ github.ref == 'refs/heads/main' && 'Production' || 'Recette' }}"
          echo ""
          echo "════════════════════════════════════════"
          echo "  🚀 RÉSUMÉ DU DÉPLOIEMENT"
          echo "  Environnement : $ENV_NAME"
          echo "════════════════════════════════════════"
          echo ""
          echo "Manifests K8s   : ✅ Validés (kustomize + dry-run)"
          echo "Terraform       : ✅ Validé (init + validate)"
          echo "Images Docker   : ✅ Build + scan Trivy OK (job précédent)"
          echo ""
          echo "Commandes de déploiement réel :"
          echo "  1. terraform apply -auto-approve"
          echo "  2. kubectl apply -k infrastructure/k8s/base"
          echo "  3. kubectl rollout status deployment/backend -n collector"
          echo "  4. kubectl rollout status deployment/frontend -n collector"
          echo ""
          echo "✅ Pipeline $ENV_NAME terminé avec succès !"
