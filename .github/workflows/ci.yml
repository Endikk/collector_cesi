name: 🚀 Quality & Delivery

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================================================================
  # BLOCK 1: BACKEND (Quality & Tests)
  # ==================================================================
  backend-quality:
    name: 🛡️ Backend Quality
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🎨 Linting (ESLint)
        working-directory: ./backend
        run: npm run lint

      - name: 🏗️ Build NestJS
        working-directory: ./backend
        run: |
          npx prisma generate
          npm run build

  backend-tests:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🧪 Unit Tests (Jest)
        working-directory: ./backend
        run: |
          npx prisma generate
          npm run test

  # ==================================================================
  # BLOCK 2: FRONTEND (Quality & Tests)
  # Depends on: Backend
  # ==================================================================
  frontend-quality:
    name: 🎨 Frontend Quality
    runs-on: ubuntu-latest
    needs: [backend-quality, backend-tests]
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
          NEXTAUTH_SECRET: supersecret
          NEXTAUTH_URL: http://localhost:3000

      - name: 🧬 Prisma Generate
        working-directory: ./frontend
        run: npx prisma generate --schema=prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: 🎨 Linting (ESLint)
        working-directory: ./frontend
        run: npm run lint

      - name: 🏗️ Build Next.js
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
          NEXTAUTH_SECRET: supersecret
          NEXTAUTH_URL: http://localhost:3000

  frontend-tests:
    name: 🧪 Frontend Tests
    runs-on: ubuntu-latest
    needs: [backend-quality, backend-tests]
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: 🧬 Prisma Generate
        working-directory: ./frontend
        run: npx prisma generate --schema=prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

      - name: 🧪 Unit Tests (Jest)
        working-directory: ./frontend
        run: npm run test
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
          NEXTAUTH_SECRET: supersecret
          NEXTAUTH_URL: http://localhost:3000

  # ==================================================================
  # BLOCK 3: AUDIT
  # Depends on: Frontend
  # ==================================================================
  global-audit:
    name: 🔒 Global Audit
    runs-on: ubuntu-latest
    needs: [frontend-quality, frontend-tests]
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: 🔍 Audit Backend
        working-directory: ./backend
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high || true

      - name: 🔍 Audit Frontend
        working-directory: ./frontend
        run: |
          npm ci --legacy-peer-deps --ignore-scripts
          npm audit --audit-level=high || true

  # ==================================================================
  # BLOCK 4: SECURITY SCAN & DOCKER
  # Depends on: Audit
  # ==================================================================
  security-and-build:
    name: 🔒 Security & Docker Build
    runs-on: ubuntu-latest
    needs: [global-audit]
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐳 Build Frontend Image
        run: docker build -f frontend/Dockerfile -t collector-app:latest .

      - name: 🔍 Trivy Scan (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'collector-app:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 🐳 Build Backend Image
        run: docker build -f backend/Dockerfile -t collector-backend:latest ./backend

      - name: 🔍 Trivy Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'collector-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ==================================================================
  # BLOCK 5: DELIVERY
  # Depends on: Security & Docker
  # ==================================================================
  deploy-simulation:
    name: 🚀 Deploy Simulation
    runs-on: ubuntu-latest
    needs: security-and-build
    if: github.event_name == 'push'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'recette' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://collector.app' || 'https://recette.collector.app' }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
      
      - name: 🚚 Deploy Simulation
        run: |
          echo "==== [FAKE DEPLOYMENT] ===="
          echo "Target Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Recette' }}"
          echo "1. Terraform Init/Apply (Simulated)..."
          echo ">> terraform apply -auto-approve"
          echo "2. Deployment Success!"
