name: 🚀 Quality & Delivery

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

# Cancel previous runs on the same branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # JOB 1: QUALITY & SECURITY (Lint, Types, Audit)
  # ------------------------------------------------------------------
  quality:
    name: 🛡️ Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Type Check
        run: npx tsc --noEmit

      - name: 🎨 Linting
        run: npm run lint

      - name: 🚨 Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ------------------------------------------------------------------
  # JOB 2: TESTING (Unit & Integration)
  # ------------------------------------------------------------------
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: ⚡ Run Vitest
        run: npm run test

  # ------------------------------------------------------------------
  # JOB 3: BUILD (Production Build Check)
  # ------------------------------------------------------------------
  build:
    name: 🏗️ Production Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🚀 Build Next.js App
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ------------------------------------------------------------------
  # JOB 4: DELIVERY - RECETTE (Develop Branch)
  # ------------------------------------------------------------------
  deploy-recette:
    name: 🚀 Deploy to Recette
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: recette
      url: https://recette.collector.app
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
      
      - name: 🚚 Deploy to Staging
        run: |
          echo "Simulating deployment to RECETTE environment..."
          # Insert actual deployment script here (e.g., Docker Hub push, SSH, Vercel)

  # ------------------------------------------------------------------
  # JOB 5: DELIVERY - PRODUCTION (Main Branch)
  # ------------------------------------------------------------------
  deploy-prod:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://collector.app
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
      
      - name: 🚚 Deploy to Production
        run: |
          echo "Simulating deployment to PRODUCTION environment..."
          # Insert actual deployment script here
