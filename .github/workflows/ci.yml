
name: 🚀 Quality & Delivery

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================================================================
  # GLOBAL QUALITY GATE
  # ==================================================================
  quality-gate:
    name: 🛡️ Quality Gate (Lint, Build, Test)
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies (Root)
        run: |
          # Install dependencies for root + workspaces (including dev dependencies)
          # We use --legacy-peer-deps to avoid potential conflicts in sub-projects
          npm ci --legacy-peer-deps

      - name: 🔧 Create Mock Environment
        run: |
          # Create a dummy .env file for the build/test process
          echo "DATABASE_URL=postgresql://ci:ci@localhost:5432/ci" >> .env
          echo "NEXT_PUBLIC_BACKEND_URL=http://localhost:4000" >> .env
          echo "NEXTAUTH_SECRET=supersecret" >> .env
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env
          # Add other required variables if needed
          echo "JWT_SECRET=supersecret" >> .env
          echo "JWT_EXPIRES_IN=7d" >> .env

      - name: 🧬 Prisma Generate
        # We need to generate the client manually first because root scripts might rely on it
        run: |
            npx prisma generate --schema=backend/prisma/schema.prisma

      - name: 🎨 Global Lint
        run: npm run lint

      - name: 🏗️ Global Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: 🧪 Global Tests
        run: npm run test

  # ==================================================================
  # SECURITY SCAN & DOCKER
  # Depends on: Quality Gate
  # ==================================================================
  security-and-build:
    name: 🔒 Security & Docker Build
    runs-on: ubuntu-latest
    needs: [quality-gate]
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐳 Build Frontend Image
        run: docker build -f frontend/Dockerfile -t collector-app:latest .

      - name: 🔍 Trivy Scan (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'collector-app:latest'
          format: 'table'
          exit-code: '0' # Don't fail the build for now, just report
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 🐳 Build Backend Image
        run: docker build -f backend/Dockerfile -t collector-backend:latest ./backend

      - name: 🔍 Trivy Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'collector-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ==================================================================
  # DELIVERY
  # Depends on: Security & Docker
  # ==================================================================
  deploy-simulation:
    name: 🚀 Deploy Simulation
    runs-on: ubuntu-latest
    needs: security-and-build
    if: github.event_name == 'push'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'recette' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://collector.app' || 'https://recette.collector.app' }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
      
      - name: 🚚 Deploy Simulation
        run: |
          echo "==== [FAKE DEPLOYMENT] ===="
          echo "Target Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Recette' }}"
          echo "1. Terraform Init/Apply (Simulated)..."
          echo ">> terraform apply -auto-approve"
          echo "2. Deployment Success!"
