name: 🚀 Quality & Delivery

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # JOB 1: FRONTEND CHECK (Lint, Build)
  # ------------------------------------------------------------------
  frontend-check:
    name: 🎨 Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: 🧬 Prisma Generate (Frontend)
        working-directory: ./frontend
        # Use local schema copy logic or point to backend if possible.
        # Since we are in CI, we can access ../backend
        run: npx prisma generate --schema=../backend/prisma/schema.prisma

      - name: 🎨 Linting
        working-directory: ./frontend
        run: npm run lint

      - name: 🏗️ Build Next.js
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ------------------------------------------------------------------
  # JOB 2: BACKEND CHECK (Lint, Test, Build)
  # ------------------------------------------------------------------
  backend-check:
    name: 🛡️ Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🎨 Linting
        working-directory: ./backend
        run: npm run lint

      # - name: 🧪 Unit Tests
      #   working-directory: ./backend
      #   run: npm run test

      - name: 🏗️ Build NestJS
        working-directory: ./backend
        run: |
          npx prisma generate
          npm run build

  # ------------------------------------------------------------------
  # JOB 3: DOCKER BUILD (Parallel)
  # ------------------------------------------------------------------
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐳 Build Frontend Image
        run: docker build -f frontend/Dockerfile -t collector-app:latest .

      - name: 🐳 Build Backend Image
        run: docker build -f backend/Dockerfile -t collector-backend:latest ./backend

  # ------------------------------------------------------------------
  # JOB 4: DELIVERY (Simulation)
  # ------------------------------------------------------------------
  deploy-simulation:
    name: 🚀 Deploy Simulation
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'recette' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://collector.app' || 'https://recette.collector.app' }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
      
      - name: 🚚 Deploy Simulation
        run: |
          echo "==== [FAKE DEPLOYMENT] ===="
          echo "Target Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Recette' }}"
          echo "1. Terraform Init/Apply (Simulated)..."
          echo ">> terraform apply -auto-approve"
          echo "2. Deployment Success!"
