name: 🚀 Quality & Delivery

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

# Cancel previous runs on the same branch to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # JOB 1: QUALITY & SECURITY (Lint, Types, Audit)
  # ------------------------------------------------------------------
  quality:
    name: 🛡️ Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔍 Type Check
        run: npx tsc --noEmit

      - name: 🎨 Linting
        run: npm run lint

      - name: 🚨 Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true

  # ------------------------------------------------------------------
  # JOB 2: TESTING (Unit & Integration)
  # ------------------------------------------------------------------
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: quality # Optional: Remove if you want parallel execution for faster feedback
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: ⚡ Run Vitest
        run: npm run test

  # ------------------------------------------------------------------
  # JOB 3: BUILD (Production Build Check)
  # ------------------------------------------------------------------
  build:
    name: 🏗️ Production Build
    runs-on: ubuntu-latest
    needs: test # Ensure we only build if tests pass
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🚀 Build Next.js App
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Add any build-time constraints here
