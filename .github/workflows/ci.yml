name: 🚀 Quality & Delivery

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ------------------------------------------------------------------
  # JOB 1: FRONTEND CHECK (Audit, Lint, Test, Build)
  # ------------------------------------------------------------------
  frontend-check:
    name: 🎨 Frontend Check
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: 🔒 NPM Audit (Security)
        working-directory: ./frontend
        run: npm audit --audit-level=high
        continue-on-error: true # Non-blocking for now

      - name: 🧬 Prisma Generate (Frontend)
        working-directory: ./frontend
        # Use backend schema for generation
        run: npx prisma generate --schema=../backend/prisma/schema.prisma

      - name: 🎨 Linting (ESLint)
        working-directory: ./frontend
        run: npm run lint

      - name: 🧪 Unit Tests (Jest)
        working-directory: ./frontend
        run: npm run test

      - name: 🏗️ Build Next.js
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  # ------------------------------------------------------------------
  # JOB 2: BACKEND CHECK (Audit, Lint, Test, Build)
  # ------------------------------------------------------------------
  backend-check:
    name: 🛡️ Backend Check
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: 🔒 NPM Audit (Security)
        working-directory: ./backend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: 🎨 Linting (ESLint)
        working-directory: ./backend
        run: npm run lint

      - name: 🧪 Unit Tests (Jest)
        working-directory: ./backend
        run: npm run test

      - name: 🏗️ Build NestJS
        working-directory: ./backend
        run: |
          npx prisma generate
          npm run build

  # ------------------------------------------------------------------
  # JOB 3: SECURITY SCAN (Trivy) & DOCKER BUILD
  # ------------------------------------------------------------------
  security-and-build:
    name: 🔒 Security & Docker Build
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐳 Build Frontend Image
        run: docker build -f frontend/Dockerfile -t collector-app:latest .

      - name: 🔍 Trivy Scan (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'collector-app:latest'
          format: 'table'
          exit-code: '0' # Don't block build on vulnerability yet
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 🐳 Build Backend Image
        run: docker build -f backend/Dockerfile -t collector-backend:latest ./backend

      - name: 🔍 Trivy Scan (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'collector-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ------------------------------------------------------------------
  # JOB 4: DELIVERY (Simulation)
  # ------------------------------------------------------------------
  deploy-simulation:
    name: 🚀 Deploy Simulation
    runs-on: ubuntu-latest
    needs: security-and-build
    if: github.event_name == 'push'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'recette' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://collector.app' || 'https://recette.collector.app' }}
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
      
      - name: 🚚 Deploy Simulation
        run: |
          echo "==== [FAKE DEPLOYMENT] ===="
          echo "Target Environment: ${{ github.ref == 'refs/heads/main' && 'Production' || 'Recette' }}"
          echo "1. Terraform Init/Apply (Simulated)..."
          echo ">> terraform apply -auto-approve"
          echo "2. Deployment Success!"
