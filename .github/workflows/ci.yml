name: 🚀 Quality & Delivery

on:
  push:
    branches: [ "main", "develop" ]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [ "main", "develop" ]
    paths-ignore:
      - "**.md"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================================================================
  # BACKEND QUALITY GATE
  # Lint (avec cache ESLint) + Unit Tests + E2E + Build
  # ==================================================================
  backend-quality:
    name: 🛡️ Backend — Lint, Tests, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: collector_test
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d collector_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/collector_test?schema=public
      JWT_SECRET: ci-jwt-secret
      JWT_EXPIRES_IN: 7d
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      ENCRYPTION_KEY: 359fdc41e2148464203957aeb095265f07851619eb357c56df4d42b18cb3ce0c
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_SECURE: false
      SMTP_USER: dev
      SMTP_PASSWORD: dev
      SMTP_FROM: ci@collector.local
      FRAUD_DETECTION_WEBHOOK_URL: https://localhost
      FRAUD_DETECTION_API_KEY: ci-key
      HTTPS_ENABLED: false

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: 🧬 Prisma Generate
        run: npx -y prisma generate --schema=backend/prisma/schema.prisma

      # Cache ESLint : évite de relancer le type-checker TypeScript sur les
      # fichiers inchangés (recommendedTypeChecked est le principal goulot).
      - name: 💾 Restore ESLint Cache
        uses: actions/cache@v4
        with:
          path: backend/.eslintcache
          key: eslint-backend-${{ runner.os }}-${{ hashFiles('backend/src/**/*.ts', 'backend/test/**/*.ts', 'backend/eslint.config.mjs', 'backend/tsconfig.json') }}
          restore-keys: |
            eslint-backend-${{ runner.os }}-

      - name: 🎨 Backend Lint
        working-directory: ./backend
        run: npm run lint:ci

      - name: 🗄️ Apply Migrations (Test DB)
        run: npx -y prisma migrate deploy --schema=backend/prisma/schema.prisma

      - name: 🧪 Backend Unit Tests
        working-directory: ./backend
        run: npm run test -- --ci --coverage --forceExit --maxWorkers=2

      - name: 🧪 Backend E2E Tests
        working-directory: ./backend
        run: npm run test:e2e -- --ci --forceExit

      - name: 🏗️ Backend Build
        working-directory: ./backend
        run: npm run build

      - name: 📊 Upload Coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ==================================================================
  # FRONTEND QUALITY GATE
  # Lint + Unit Tests + Build
  # ==================================================================
  frontend-quality:
    name: 🎨 Frontend — Lint, Tests, Build
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
      BACKEND_URL: http://localhost:4000
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: 1
      REDIS_HOST: localhost
      REDIS_PORT: "6379"

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: 🧬 Prisma Generate
        run: |
          npx -y prisma generate --schema=backend/prisma/schema.prisma
          npx -y prisma generate --schema=frontend/prisma/schema.prisma

      - name: 🎨 Frontend Lint
        working-directory: ./frontend
        run: npm run lint

      - name: 🧪 Frontend Tests
        working-directory: ./frontend
        run: npm run test -- --ci --passWithNoTests

      - name: 🏗️ Frontend Build
        working-directory: ./frontend
        run: npm run build

  # ==================================================================
  # DEPENDENCY AUDIT
  # Vérifie les vulnérabilités connues dans les dépendances
  # ==================================================================
  dependency-audit:
    name: 🔍 Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci --legacy-peer-deps --ignore-scripts

      - name: 🔒 npm audit (Root)
        run: npm audit --omit=dev --audit-level=high || true

      - name: 🔒 npm audit (Backend)
        working-directory: ./backend
        run: npm audit --omit=dev --audit-level=high || true

      - name: 🔒 npm audit (Frontend)
        working-directory: ./frontend
        run: npm audit --omit=dev --audit-level=high || true

  # ==================================================================
  # SECURITY SCAN & DOCKER BUILD
  # Construit les images Docker et les scanne avec Trivy
  # ==================================================================
  security-and-build:
    name: 🔒 Security Scan & Docker Build
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: backend/Dockerfile
          push: false
          load: true
          tags: collector-backend:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: 🔍 Trivy Scan — Backend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'collector-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: 🐳 Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          load: true
          tags: collector-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: 🔍 Trivy Scan — Frontend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'collector-frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ==================================================================
  # DEPLOY SIMULATION — GCP / GKE
  #
  # Simule le déploiement vers Google Cloud Platform :
  #   - Valide les manifests K8s (kustomize + dry-run)
  #   - Valide la configuration Terraform (GKE)
  #   - Affiche les commandes gcloud / kubectl du vrai déploiement
  #
  # Secrets requis en production :
  #   GCP_PROJECT_ID       → ID du projet GCP
  #   GCP_REGION           → Région (ex: europe-west1)
  #   GCP_CLUSTER_NAME     → Nom du cluster GKE
  #   GOOGLE_CREDENTIALS   → Service account JSON (base64)
  # ==================================================================
  deploy-simulation:
    name: 🚀 Deploy Simulation — GCP
    runs-on: ubuntu-latest
    needs: [security-and-build, dependency-audit]
    if: github.event_name == 'push'
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'recette' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://collector.app' || 'https://recette.collector.app' }}

    env:
      GCP_PROJECT_ID:   ${{ vars.GCP_PROJECT_ID   || 'collector-prod' }}
      GCP_REGION:       ${{ vars.GCP_REGION        || 'europe-west1' }}
      GCP_CLUSTER_NAME: ${{ vars.GCP_CLUSTER_NAME  || 'collector-cluster' }}

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      # ── kubectl ──────────────────────────────────────────────────
      - name: 🔧 Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.29.0'

      # ── Kustomize ────────────────────────────────────────────────
      - name: 🔧 Install Kustomize
        uses: imranismail/setup-kustomize@v2

      # ── Validation K8s ───────────────────────────────────────────
      - name: ✅ Validate Kubernetes Manifests
        run: |
          echo "════════════════════════════════════════"
          echo "  🔍 VALIDATION DES MANIFESTS K8S"
          echo "════════════════════════════════════════"
          echo ""

          echo "1. kustomize build infrastructure/k8s/base/"
          kustomize build infrastructure/k8s/base/ > /tmp/k8s-manifests.yaml
          echo "   ✅ Kustomize build réussi"
          echo ""

          echo "2. kubectl apply --dry-run=client"
          kubectl apply --dry-run=client -f /tmp/k8s-manifests.yaml
          echo "   ✅ Dry-run validé — les manifests sont conformes"
          echo ""

          echo "3. Vérification de l'utilisation des K8s Secrets..."
          if grep -q 'secretKeyRef' infrastructure/k8s/base/backend.yaml && \
             grep -q 'secretKeyRef' infrastructure/k8s/base/frontend.yaml && \
             grep -q 'secretKeyRef' infrastructure/k8s/base/postgres.yaml; then
            echo "   ✅ Tous les secrets sont référencés via secretKeyRef"
          else
            echo "   ⚠️  Certains manifests n'utilisent pas secretKeyRef"
          fi
          echo ""

          echo "4. Ressources K8s générées :"
          echo "   Deployments : $(grep -c 'kind: Deployment'               /tmp/k8s-manifests.yaml)"
          echo "   StatefulSets: $(grep -c 'kind: StatefulSet'              /tmp/k8s-manifests.yaml)"
          echo "   Services    : $(grep -c 'kind: Service'                  /tmp/k8s-manifests.yaml)"
          echo "   Secrets     : $(grep -c 'kind: Secret'                   /tmp/k8s-manifests.yaml)"
          echo "   HPA         : $(grep -c 'kind: HorizontalPodAutoscaler'  /tmp/k8s-manifests.yaml)"
          echo "   Ingress     : $(grep -c 'kind: Ingress'                  /tmp/k8s-manifests.yaml)"
          echo ""

      # ── Terraform (GKE) ──────────────────────────────────────────
      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: ✅ Terraform Init & Validate (GKE)
        working-directory: ./infrastructure/terraform
        run: |
          echo "════════════════════════════════════════"
          echo "  🏗️  VALIDATION TERRAFORM — GKE"
          echo "════════════════════════════════════════"
          terraform init -backend=false
          terraform validate
          echo "✅ Configuration Terraform GKE valide"

      # ── Simulation déploiement GCP ────────────────────────────────
      - name: 🚀 GCP Deploy Simulation
        run: |
          ENV_NAME="${{ github.ref == 'refs/heads/main' && 'Production' || 'Recette' }}"
          echo ""
          echo "════════════════════════════════════════"
          echo "  🚀 SIMULATION DÉPLOIEMENT GCP"
          echo "  Environnement : $ENV_NAME"
          echo "  Projet        : $GCP_PROJECT_ID"
          echo "  Région        : $GCP_REGION"
          echo "  Cluster GKE   : $GCP_CLUSTER_NAME"
          echo "════════════════════════════════════════"
          echo ""
          echo "── Étape 1 : Authentification GCP ──────────────────────"
          echo "  gcloud auth activate-service-account \\"
          echo "    --key-file=\$GOOGLE_CREDENTIALS"
          echo ""
          echo "── Étape 2 : Provisionnement GKE (Terraform) ───────────"
          echo "  terraform -chdir=infrastructure/terraform apply \\"
          echo "    -auto-approve \\"
          echo "    -var=\"project_id=\$GCP_PROJECT_ID\" \\"
          echo "    -var=\"region=\$GCP_REGION\" \\"
          echo "    -var=\"cluster_name=\$GCP_CLUSTER_NAME\""
          echo ""
          echo "── Étape 3 : Configuration kubectl → GKE ───────────────"
          echo "  gcloud container clusters get-credentials \$GCP_CLUSTER_NAME \\"
          echo "    --region \$GCP_REGION \\"
          echo "    --project \$GCP_PROJECT_ID"
          echo ""
          echo "── Étape 4 : Push images → Artifact Registry ───────────"
          echo "  docker tag collector-backend:latest \\"
          echo "    europe-west1-docker.pkg.dev/\$GCP_PROJECT_ID/collector/backend:\${{ github.sha }}"
          echo "  docker push europe-west1-docker.pkg.dev/\$GCP_PROJECT_ID/collector/backend:\${{ github.sha }}"
          echo ""
          echo "  docker tag collector-frontend:latest \\"
          echo "    europe-west1-docker.pkg.dev/\$GCP_PROJECT_ID/collector/frontend:\${{ github.sha }}"
          echo "  docker push europe-west1-docker.pkg.dev/\$GCP_PROJECT_ID/collector/frontend:\${{ github.sha }}"
          echo ""
          echo "── Étape 5 : Déploiement K8s ───────────────────────────"
          echo "  kubectl apply -k infrastructure/k8s/base"
          echo "  kubectl rollout status deployment/backend  -n collector"
          echo "  kubectl rollout status deployment/frontend -n collector"
          echo ""
          echo "✅ Simulation $ENV_NAME complète !"

      - name: 📋 GitHub Step Summary
        if: always()
        run: |
          ENV_NAME="${{ github.ref == 'refs/heads/main' && 'Production' || 'Recette' }}"
          {
            echo "## 🚀 Deploy Simulation GCP — $ENV_NAME"
            echo ""
            echo "| Check | Statut |"
            echo "|-------|--------|"
            echo "| Kubernetes Manifests (kustomize + dry-run) | ✅ |"
            echo "| Terraform GKE (init + validate) | ✅ |"
            echo "| Docker Images (backend + frontend) | ✅ |"
            echo "| Security Scan (Trivy) | ✅ |"
            echo ""
            echo "### Cible GCP"
            echo "| Paramètre | Valeur |"
            echo "|-----------|--------|"
            echo "| Projet | \`$GCP_PROJECT_ID\` |"
            echo "| Région | \`$GCP_REGION\` |"
            echo "| Cluster GKE | \`$GCP_CLUSTER_NAME\` |"
            echo "| Artifact Registry | \`$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/collector\` |"
            echo ""
            echo "> Commit : \`${{ github.sha }}\` — Branche : \`${{ github.ref_name }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
